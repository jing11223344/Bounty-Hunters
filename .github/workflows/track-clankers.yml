name: Track Clankers

on:
  pull_request_target:
    types: [opened]

concurrency:
  group: track-clankers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update clankers-local.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const username = context.payload.pull_request.user.login;
            const now = new Date().toISOString();
            const localFile = 'clankers-local.json';

            execSync('git pull --rebase origin main', { stdio: 'inherit' });

            let rows = [];
            if (fs.existsSync(localFile)) {
              rows = JSON.parse(fs.readFileSync(localFile, 'utf8'));
            }

            const existing = rows.find(r => r.username === username);
            if (existing) {
              existing.total_prs += 1;
              existing.last_pr = now;
            } else {
              rows.push({
                username: username,
                total_prs: 1,
                first_pr: now,
                last_pr: now
              });
            }

            rows.sort((a, b) => b.total_prs - a.total_prs);
            fs.writeFileSync(localFile, JSON.stringify(rows, null, 2) + '\n');

            const diff = execSync('git diff --quiet clankers-local.json || echo changed').toString().trim();
            if (diff !== 'changed') {
              console.log('No changes needed');
              return;
            }

            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git add clankers-local.json');
            execSync(`git commit -m "clankers: track PR from ${username}"`);
            execSync('git pull --rebase origin main', { stdio: 'inherit' });
            execSync('git push', { stdio: 'inherit' });
            console.log(`Tracked ${username}`);
